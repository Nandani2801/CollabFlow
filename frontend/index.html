<!DOCTYPE html>
<html>
<head>
    <title>CollabFlow</title>
    <style>
        body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; }
        canvas { background: white; cursor: crosshair; margin-top: 10px; }
        #toolbar { display: flex; gap: 10px; padding: 10px; color: white; align-items: center; }
        #status { padding: 4px 10px; border-radius: 12px; font-size: 14px; }
        .connected { background: #27ae60; }
        .disconnected { background: #e74c3c; }
    </style>
</head>
<body>
    <div id="toolbar">
        <label>Color: <input type="color" id="colorPicker" value="#000000"></label>
        <label>Size: <input type="range" id="brushSize" min="1" max="20" value="3"></label>
        <button onclick="clearCanvas()">Clear</button>
        <span id="status" class="disconnected">Disconnected</span>
    </div>
    <canvas id="canvas" width="900" height="600"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false, lastX = 0, lastY = 0;

        // unique ID for this browser tab
        const clientId = Math.random().toString(36).slice(2);

        const ws = new WebSocket('ws://127.0.0.1:8081');

        ws.onopen = () => {
            document.getElementById('status').className = 'connected';
            document.getElementById('status').textContent = 'Connected';
            loadCanvasState();
        };

        ws.onclose = () => {
            document.getElementById('status').className = 'disconnected';
            document.getElementById('status').textContent = 'Disconnected';
            // auto reconnect after 1 second
            setTimeout(() => location.reload(), 1000);
        };

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'stroke') drawLine(msg.stroke);
            if (msg.type === 'clear') ctx.clearRect(0, 0, canvas.width, canvas.height);
        };

        async function loadCanvasState() {
            try {
                const res = await fetch('http://127.0.0.1:8081/canvas-state');
                const data = await res.json();

                // replay all strokes in order
                // null = clear marker (someone pressed clear button)
                data.strokes.forEach(stroke => {
                    if (stroke === null) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    } else {
                        drawLine(stroke);
                    }
                });

                console.log(`Canvas loaded: ${data.strokes.length} strokes`);
            } catch (e) {
                console.log('Could not load canvas state:', e);
            }
        }

        function drawLine({ x1, y1, x2, y2, color, width }) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        // ✅ lower throttle — catches faster small strokes
let lastSendTime = 0;
const SEND_INTERVAL_MS = 8; // was 16, now 8ms

canvas.addEventListener('mousemove', (e) => {
    if (!drawing) return;

    const now = Date.now();
    const stroke = {
        x1: lastX, y1: lastY,
        x2: e.offsetX, y2: e.offsetY,
        color: document.getElementById('colorPicker').value,
        width: parseInt(document.getElementById('brushSize').value),
        clientId
    };

    drawLine(stroke);

    if (ws.readyState === WebSocket.OPEN && now - lastSendTime >= SEND_INTERVAL_MS) {
        ws.send(JSON.stringify({ type: 'stroke', stroke }));
        lastSendTime = now;
    }

    [lastX, lastY] = [e.offsetX, e.offsetY];
});

// ✅ NEW: always send final stroke on mouseup
// This guarantees the last segment of any shape always reaches the server
canvas.addEventListener('mouseup', (e) => {
    if (drawing && ws.readyState === WebSocket.OPEN) {
        const stroke = {
            x1: lastX, y1: lastY,
            x2: e.offsetX, y2: e.offsetY,
            color: document.getElementById('colorPicker').value,
            width: parseInt(document.getElementById('brushSize').value),
            clientId
        };
        ws.send(JSON.stringify({ type: 'stroke', stroke }));
    }
    drawing = false;
});
        canvas.addEventListener('mouseleave', () => drawing = false);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'clear' }));
            }
        }
    </script>
</body>
</html>
